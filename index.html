<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAOLAB</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#ffffff;
  color:#111111;
  font-family: Inter, Arial, sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  text-align:center;
  width:min(90%,700px);
}

.logo{
  font-size:clamp(48px,8vw,90px);
  font-weight:700;
  letter-spacing:-3px;
}

.subtitle{
  margin-top:12px;
  color:#777;
  font-size:16px;
}

.links{
  margin-top:80px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.links a{
  text-decoration:none;
  color:#111;
  font-size:28px;
  font-weight:600;
  transition:.2s ease;
}

.links a:hover{
  opacity:.45;
}

.footer{
  margin-top:80px;
  font-size:12px;
  color:#999;
}
</style>

</head>

<body>

<div class="container">

  <div class="logo">TAOLAB</div>

  <div class="subtitle">
    A creative ecosystem.
  </div>

  <div class="links">
    <a href="/aura/">AURA</a>
    <a href="/moment/">MOMENT</a>
    <a href="/after7/">AFTER7</a>
    <a href="/wav/">WAV</a>
  </div>

  <div class="footer">
    © TAOLAB
  </div>

</div>

</body>
</html>
